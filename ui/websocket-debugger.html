<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket Connection Debugger</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            max-width: 900px;
            margin: 50px auto;
            padding: 20px;
            background: #1e1e1e;
            color: #d4d4d4;
        }
        h1 {
            color: #4ec9b0;
        }
        .container {
            background: #252526;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
            font-weight: bold;
        }
        .status.connected {
            background: #4caf50;
            color: white;
        }
        .status.disconnected {
            background: #f44336;
            color: white;
        }
        button {
            background: #0e639c;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover {
            background: #1177bb;
        }
        button:disabled {
            background: #666;
            cursor: not-allowed;
        }
        .log {
            background: #1e1e1e;
            padding: 15px;
            border-radius: 4px;
            max-height: 400px;
            overflow-y: auto;
            margin: 20px 0;
            font-size: 12px;
        }
        .log-entry {
            margin: 3px 0;
            padding: 3px;
        }
        .log-entry.error {
            color: #f48771;
        }
        .log-entry.success {
            color: #4ec9b0;
        }
        .log-entry.info {
            color: #9cdcfe;
        }
        input {
            background: #3c3c3c;
            border: 1px solid #555;
            color: #d4d4d4;
            padding: 8px;
            border-radius: 4px;
            width: 300px;
            font-family: 'Courier New', monospace;
        }
        .test-section {
            margin: 20px 0;
            padding: 15px;
            background: #2d2d30;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <h1>🔌 WebSocket Connection Debugger</h1>
    
    <div class="container">
        <div id="status" class="status disconnected">
            Status: DISCONNECTED
        </div>
        
        <div>
            <label>WebSocket URL:</label><br>
            <input type="text" id="wsUrl" value="ws://localhost:8000" style="width: 400px;">
        </div>
        <br>
        <button onclick="connect()">Connect</button>
        <button onclick="disconnect()" id="disconnectBtn" disabled>Disconnect</button>
        <button onclick="clearLog()">Clear Log</button>
    </div>

    <div class="test-section">
        <h3>🧪 Test Messages</h3>
        <button onclick="sendTestMessage('chat')">Send Chat Message</button>
        <button onclick="sendTestMessage('ping')">Send Ping</button>
        <button onclick="checkState()">Check Connection State</button>
        
        <br><br>
        <label>Custom Message:</label><br>
        <input type="text" id="customMsg" placeholder="What's the weather?" style="width: 300px;">
        <button onclick="sendCustomMessage()">Send Custom</button>
    </div>

    <div class="container">
        <h3>📋 Connection Log</h3>
        <div id="log" class="log"></div>
    </div>

    <script>
        let ws = null;
        let sessionId = `test_${Date.now()}`;

        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            const time = new Date().toLocaleTimeString();
            entry.textContent = `[${time}] ${message}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(`[${type.toUpperCase()}] ${message}`);
        }

        function updateStatus(connected) {
            const statusDiv = document.getElementById('status');
            const disconnectBtn = document.getElementById('disconnectBtn');
            
            if (connected) {
                statusDiv.textContent = 'Status: CONNECTED ✓';
                statusDiv.className = 'status connected';
                disconnectBtn.disabled = false;
            } else {
                statusDiv.textContent = 'Status: DISCONNECTED ✗';
                statusDiv.className = 'status disconnected';
                disconnectBtn.disabled = true;
            }
        }

        function checkState() {
            if (!ws) {
                log('❌ WebSocket is null', 'error');
                return;
            }

            const states = {
                0: 'CONNECTING',
                1: 'OPEN',
                2: 'CLOSING',
                3: 'CLOSED'
            };

            log(`📊 WebSocket State: ${states[ws.readyState]} (${ws.readyState})`, 'info');
            log(`📊 Session ID: ${sessionId}`, 'info');
            log(`📊 URL: ${ws.url}`, 'info');
            
            const isConnected = ws.readyState === WebSocket.OPEN;
            log(`📊 Is Connected: ${isConnected}`, isConnected ? 'success' : 'error');
        }

        function connect() {
            const url = document.getElementById('wsUrl').value;
            const wsUrl = `${url}/ws/${sessionId}`;
            
            log(`🔌 Attempting to connect to: ${wsUrl}`, 'info');

            try {
                ws = new WebSocket(wsUrl);

                ws.onopen = () => {
                    log('✅ WebSocket CONNECTED', 'success');
                    updateStatus(true);
                    checkState();
                };

                ws.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        log(`📨 Received: ${JSON.stringify(data, null, 2)}`, 'success');
                    } catch (e) {
                        log(`📨 Received (raw): ${event.data}`, 'info');
                    }
                };

                ws.onerror = (error) => {
                    log(`❌ WebSocket ERROR: ${error}`, 'error');
                    console.error('WebSocket error:', error);
                };

                ws.onclose = (event) => {
                    log(`🔌 WebSocket CLOSED (code: ${event.code}, reason: ${event.reason})`, 'error');
                    updateStatus(false);
                };

            } catch (error) {
                log(`❌ Failed to create WebSocket: ${error.message}`, 'error');
            }
        }

        function disconnect() {
            if (ws) {
                log('🔌 Disconnecting...', 'info');
                ws.close();
                ws = null;
                updateStatus(false);
            }
        }

        function sendTestMessage(type) {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                log('❌ Cannot send - WebSocket not connected', 'error');
                checkState();
                return;
            }

            const messages = {
                'chat': {
                    type: 'chat',
                    message: 'Test message from debugger',
                    timestamp: Date.now()
                },
                'ping': {
                    type: 'ping',
                    timestamp: Date.now()
                }
            };

            const msg = messages[type];
            log(`📤 Sending ${type}: ${JSON.stringify(msg)}`, 'info');
            
            try {
                ws.send(JSON.stringify(msg));
                log('✅ Message sent successfully', 'success');
            } catch (error) {
                log(`❌ Failed to send: ${error.message}`, 'error');
            }
        }

        function sendCustomMessage() {
            const text = document.getElementById('customMsg').value;
            
            if (!text) {
                log('❌ Please enter a message', 'error');
                return;
            }

            if (!ws || ws.readyState !== WebSocket.OPEN) {
                log('❌ Cannot send - WebSocket not connected', 'error');
                checkState();
                return;
            }

            const msg = {
                type: 'chat',
                message: text,
                timestamp: Date.now()
            };

            log(`📤 Sending: ${text}`, 'info');
            
            try {
                ws.send(JSON.stringify(msg));
                log('✅ Message sent successfully', 'success');
                document.getElementById('customMsg').value = '';
            } catch (error) {
                log(`❌ Failed to send: ${error.message}`, 'error');
            }
        }

        function clearLog() {
            document.getElementById('log').innerHTML = '';
        }

        // Initial log
        window.onload = () => {
            log('🚀 WebSocket Debugger Ready', 'success');
            log('ℹ️  Enter backend URL and click Connect', 'info');
        };
    </script>
</body>
</html>
